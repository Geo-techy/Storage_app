
services:

  postgres:
    image: postgres:16
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: storage

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build: ./backend

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    volumes:
      - ./backend/uploads:/app/uploads

    env_file:
      - ./backend/.env.docker

  frontend:

    build: ./frontend

    ports:
      - "8080:8080"

    depends_on:
      - backend

volumes:
  postgres_data: